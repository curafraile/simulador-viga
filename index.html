<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="icono.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="theme-color" content="#3498db">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Simulador Viga ETHA - Análisis Vectorial</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f0f0f0; touch-action: auto; font-family: sans-serif; }
        canvas { display: block; }
        .menu-superior { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; z-index: 100; }
        button { padding: 8px 12px; border-radius: 5px; border: 1px solid #666; background: white; font-weight: bold; cursor: pointer; }
        .btn-add { background: #d4edda; }
        .btn-dist { background: #fff3cd; }
        .btn-reset { background: #f8d7da; }
        input { font-size: 16px !important; }
    </style>
</head>
<body>

<div class="menu-superior">
    <button class="btn-add" onclick="agregarCarga()">+ Carga</button>
    <button class="btn-dist" onclick="agregarDistribuida()">+ Distr</button>
    <button class="btn-reset" onclick="reiniciarCargas()">Reset</button>
</div>

<script>
let vigaY, margenH;
let vigaLongitudM = 10; 
let apoyos = [
    {x_rel: 0.15, tipo: 'fijo', lado: 1}, 
    {x_rel: 0.85, tipo: 'movil', lado: 1}
];
let cargas = [];
let distribuidas = [];
let dragging = null;
let seleccionado = null;

let inputF, inputAng, inputLong, inputDist, btnOk;

function setup() {
    createCanvas(windowWidth, windowHeight);
    actualizarDimensiones();

    inputLong = createInput('10').size(40);
    inputLong.position(20, 50);
    inputLong.input(() => { vigaLongitudM = parseFloat(inputLong.value()) || 0.1; });
    
    inputF = createInput('').size(50).hide();
    inputAng = createInput('').size(40).hide();
    inputDist = createInput('').size(40).hide(); 
    btnOk = createButton('OK').hide();
    btnOk.mousePressed(guardarCambios);
}

function actualizarDimensiones() {
    vigaY = height * 0.20; 
    margenH = width * 0.1;
}

function xRelToM(x_rel) {
    return x_rel * vigaLongitudM;
}

function pxToM(px) {
    let anchoUtil = width - 2 * margenH;
    return (px - margenH) / anchoUtil * vigaLongitudM;
}

function draw() {
    background(245);
    textAlign(LEFT); fill(50); noStroke(); textSize(12);
    text("Longitud Total (m):", 20, 40);

    strokeWeight(10); stroke(60);
    line(margenH, vigaY, width - margenH, vigaY);
    
    dibujarCotasRelativas();
    dibujarApoyos();
    dibujarDistribuidas();
    dibujarCargas();
    calcularYDibujarCalculos();

    if (seleccionado) {
        let anchoUtil = width - 2 * margenH;
        let x_pos = seleccionado.x_rel !== undefined ? seleccionado.x_rel : (seleccionado.x1 + seleccionado.x2) / 2;
        let x = margenH + x_pos * anchoUtil;
        let panelX = constrain(x - 75, 10, width - 160);
        let panelY = vigaY + 100; 
        
        fill(255, 240, 200, 230); stroke(0); strokeWeight(1);
        let esDist = seleccionado.x1 !== undefined;
        let hPanel = esDist ? 95 : 90;
        rect(panelX, panelY, 150, hPanel, 5);
        
        fill(0); textAlign(CENTER); noStroke(); textSize(10);
        if (esDist) {
            text("Fuerza Total (N):", panelX + 45, panelY + 25); inputF.position(panelX + 95, panelY + 12).show();
            text("Distancia (m):", panelX + 45, panelY + 55); inputDist.position(panelX + 95, panelY + 42).show();
            btnOk.position(panelX + 60, panelY + 70).show();
        } else {
            text("Fuerza (N):", panelX + 45, panelY + 25); inputF.position(panelX + 95, panelY + 12).show();
            text("Ang (°):", panelX + 45, panelY + 50); inputAng.position(panelX + 95, panelY + 37).show();
            btnOk.position(panelX + 60, panelY + 65).show();
        }
    }
}

function dibujarCotasRelativas() {
    let anchoUtil = width - 2 * margenH;
    let yCota = vigaY - 70;
    let puntos = [{x: 0}, {x: 1}];
    apoyos.forEach(a => puntos.push({x: a.x_rel}));
    cargas.forEach(c => puntos.push({x: c.x_rel}));
    distribuidas.forEach(d => { puntos.push({x: d.x1}); puntos.push({x: d.x2}); });
    puntos.sort((a, b) => a.x - b.x);

    for (let i = 0; i < puntos.length - 1; i++) {
        let x1 = margenH + puntos[i].x * anchoUtil;
        let x2 = margenH + puntos[i+1].x * anchoUtil;
        let distM = (puntos[i+1].x - puntos[i].x) * vigaLongitudM;
        if (distM > 0.001) {
            stroke(180); strokeWeight(1);
            line(x1, yCota, x2, yCota);
            line(x1, yCota-5, x1, yCota+5); line(x2, yCota-5, x2, yCota+5);
            drawingContext.setLineDash([4, 4]); line(x1, yCota+5, x1, vigaY-10);
            if(i == puntos.length-2) line(x2, yCota+5, x2, vigaY-10);
            drawingContext.setLineDash([]);
            fill(0); noStroke(); textAlign(CENTER); text(distM.toFixed(2) + "m", (x1 + x2) / 2, yCota - 10);
        }
    }
}

function dibujarDistribuidas() {
    let anchoUtil = width - 2 * margenH;
    distribuidas.forEach(d => {
        let x1 = margenH + d.x1 * anchoUtil, x2 = margenH + d.x2 * anchoUtil;
        let h = 40, esParaArriba = d.dir === -1; 
        let q = d.f / ((d.x2 - d.x1) * vigaLongitudM); 
        fill(255, 165, 0, 80); stroke(255, 140, 0); strokeWeight(1);
        let yRect = esParaArriba ? vigaY - h : vigaY;
        rect(x1, yRect, x2 - x1, h);
        for (let i = x1 + 2; i <= x2; i += 12) {
            line(i, yRect, i, yRect + h);
            if (esParaArriba) triangle(i-3, vigaY-h+5, i+3, vigaY-h+5, i, vigaY-h);
            else triangle(i-3, vigaY+h-5, i+3, vigaY+h-5, i, vigaY+h);
        }
        fill(0); noStroke(); textAlign(CENTER);
        text(q.toFixed(1) + " N/m", (x1+x2)/2, esParaArriba ? vigaY-h-5 : vigaY+h+15);
        fill(255, 200, 0); stroke(0); ellipse((x1 + x2) / 2, vigaY, 18, 18);
    });
}

function dibujarCargas() {
    let anchoUtil = width - 2 * margenH;
    for (let c of cargas) {
        let x = margenH + c.x_rel * anchoUtil;
        let r = radians(360 - c.ang);
        let xf = x + 50 * cos(r); let yf = vigaY + 50 * sin(r);
        stroke('#e74c3c'); strokeWeight(3); line(xf, yf, x, vigaY);
        push(); translate(x, vigaY); rotate(r); fill('#e74c3c'); triangle(0, 0, 10, 5, 10, -5);
        noFill(); stroke(100, 100, 255); strokeWeight(1); arc(0, 0, 30, 30, -radians(c.ang), 0); pop();
        fill(0); noStroke(); textAlign(CENTER); text(`${c.f}N / ${c.ang}°`, xf, yf - 8);
        fill(seleccionado === c ? 'yellow' : 'red'); stroke(0); strokeWeight(1); ellipse(x, vigaY, 22, 22);
    }
}

function guardarCambios() {
    if (seleccionado) {
        seleccionado.f = parseFloat(inputF.value()) || 0;
        if (seleccionado.x1 !== undefined) {
            let nuevaDistRel = (parseFloat(inputDist.value()) || 1) / vigaLongitudM;
            let centro = (seleccionado.x1 + seleccionado.x2) / 2;
            seleccionado.x1 = constrain(centro - nuevaDistRel/2, 0, 1);
            seleccionado.x2 = constrain(centro + nuevaDistRel/2, 0, 1);
        } else { seleccionado.ang = parseFloat(inputAng.value()) || 270; }
    }
    seleccionado = null; inputF.hide(); inputAng.hide(); inputDist.hide(); btnOk.hide();
}

function touchStarted() {
    let anchoUtil = width - 2 * margenH;
    
    // 1. Detectar clic en apoyos para cambiar de LADO (Arriba/Abajo)
    for (let ap of apoyos) {
        if (dist(mouseX, mouseY, margenH + ap.x_rel * anchoUtil, vigaY + (ap.lado * 20)) < 40) {
            ap.lado *= -1; // Cambia entre 1 y -1
            dragging = ap;
            return false;
        }
    }

    if (seleccionado && mouseY > vigaY + 90) return; 

    // 2. Detectar clic en cargas distribuidas
    for (let d of distribuidas) {
        if (dist(mouseX, mouseY, margenH + (d.x1 + d.x2) / 2 * anchoUtil, vigaY) < 25) {
            if (seleccionado === d) { d.dir *= -1; }
            seleccionado = d; 
            inputF.value(d.f);
            inputDist.value(((d.x2 - d.x1) * vigaLongitudM).toFixed(2));
            dragging = d; 
            return false;
        }
    }

    // 3. Detectar clic en cargas puntuales
    for (let c of cargas) {
        if (dist(mouseX, mouseY, margenH + c.x_rel * anchoUtil, vigaY) < 30) {
            seleccionado = c; 
            inputF.value(c.f); 
            inputAng.value(c.ang);
            dragging = c; 
            return false;
        }
    }
    
    // Reset de selección si se toca fuera
    if (mouseY < vigaY - 100 || mouseY > vigaY + 300) {
        seleccionado = null; 
        inputF.hide(); inputAng.hide(); inputDist.hide(); btnOk.hide();
    }
}

function touchMoved() {
    if (!dragging) return;
    let nr = constrain((mouseX - margenH) / (width - 2 * margenH), 0, 1);
    if (dragging.x_rel !== undefined) dragging.x_rel = nr;
    else { let w = dragging.x2 - dragging.x1; dragging.x1 = constrain(nr - w/2, 0, 1-w); dragging.x2 = dragging.x1 + w; }
    return false;
}

function agregarCarga() { cargas.push({x_rel: 0.5, f: 100, ang: 270}); }
function agregarDistribuida() { distribuidas.push({x1: 0.3, x2: 0.6, f: 100, dir: 1}); }
function reiniciarCargas() { cargas = []; distribuidas = []; seleccionado = null; }
function windowResized() { resizeCanvas(windowWidth, windowHeight); actualizarDimensiones(); }

function dibujarApoyos() {
    let anchoUtil = width - 2 * margenH;
    apoyos.forEach(ap => {
        let x = margenH + ap.x_rel * anchoUtil;
        // Ajuste de posición: si lado es -1, sube; si es 1, baja.
        let yBase = vigaY + (ap.lado * 5); 
        
        push(); 
        translate(x, yBase); 
        if (ap.lado === -1) scale(1, -1); // Invierte el dibujo hacia arriba
        
        fill(ap.tipo === 'fijo' ? '#3498db' : '#bdc3c7'); 
        stroke(50); 
        strokeWeight(2);
        
        if (ap.tipo === 'fijo') {
            triangle(-15, 25, 15, 25, 0, 0); 
        } else { 
            ellipse(0, 10, 18, 18); 
            line(-15, 25, 15, 25); 
        }
        pop();
    });
}

function calcularYDibujarCalculos() {
    let anchoUtil = width - 2 * margenH;
    let xA_m = xRelToM(apoyos[0].x_rel);
    let xB_m = xRelToM(apoyos[1].x_rel);
    let xA_px = margenH + apoyos[0].x_rel * anchoUtil;
    let xB_px = margenH + apoyos[1].x_rel * anchoUtil;
    
    let sumFy = 0, sumM_A = 0, sumFx = 0;
    
    cargas.forEach(c => { 
        let fy = c.f * sin(radians(360 - c.ang));
        let fx = c.f * cos(radians(360 - c.ang));
        if (abs(fx) < 0.001) fx = 0;
        if (abs(fy) < 0.001) fy = 0;
        sumFy += fy; sumFx += fx;
        sumM_A += fy * (xRelToM(c.x_rel) - xA_m);
    });

    distribuidas.forEach(d => {
        let fyTotal = d.f * d.dir; sumFy += fyTotal; 
        sumM_A += fyTotal * (xRelToM((d.x1 + d.x2) / 2) - xA_m);
    });
    
    let distanciaAB = xB_m - xA_m;
    let Rby = sumM_A / distanciaAB;
    let Ray = sumFy - Rby;
    let Rax = -sumFx;

    noStroke(); textAlign(CENTER); textSize(11);
    let ra_fix = apoyos[0].tipo === 'fijo';
    
    fill(255, 235); stroke(180); strokeWeight(1);
    let modA = ra_fix ? sqrt(sq(Ray) + sq(Rax)) : abs(Ray);
    let angA = ra_fix ? degrees(atan2(Ray, -Rax)) : (Ray >= 0 ? 90 : 270);
    if(angA < 0) angA += 360;
    rect(xA_px - 45, vigaY + 35, 90, 50, 5); 
    fill('#27ae60'); noStroke();
    let txtA = `Ray: ${Ray.toFixed(1)}N`;
    if(ra_fix) txtA += `\nRax: ${Rax.toFixed(1)}N\nRa: ${modA.toFixed(1)}N | ${angA.toFixed(1)}°`;
    text(txtA, xA_px, vigaY + 48);
    dibujarFlechaResultante(xA_px, Ray, ra_fix ? Rax : 0);

    let rb_fix = apoyos[1].tipo === 'fijo';
    let modB = rb_fix ? sqrt(sq(Rby) + sq(Rax)) : abs(Rby);
    let angB = rb_fix ? degrees(atan2(Rby, -Rax)) : (Rby >= 0 ? 90 : 270);
    if(angB < 0) angB += 360;
    fill(255, 235); stroke(180); strokeWeight(1);
    rect(xB_px - 45, vigaY + 35, 90, 50, 5); 
    fill('#27ae60'); noStroke();
    let txtB = `Rby: ${Rby.toFixed(1)}N`;
    if(rb_fix) txtB += `\nRax: ${Rax.toFixed(1)}N\nRb: ${modB.toFixed(1)}N | ${angB.toFixed(1)}°`;
    text(txtB, xB_px, vigaY + 48);
    dibujarFlechaResultante(xB_px, Rby, rb_fix ? Rax : 0);

    drawAxial(Rax, xA_px, xB_px);
    let cortanteVals = drawCortante(Ray, Rby, xA_px, xB_px); 
    drawMomento(Ray, Rby, xA_px, xB_px, cortanteVals);
}

function dibujarFlechaResultante(x, ry, rx) {
    if (abs(ry) < 0.1 && abs(rx) < 0.1) return;
    let largo = 45;
    let ang = atan2(ry, -rx);
    let xFin = x - largo * cos(ang);
    let yFin = vigaY + largo * sin(ang);
    stroke('#27ae60'); strokeWeight(3);
    line(x, vigaY, xFin, yFin);
    push(); translate(xFin, yFin); rotate(-ang + PI + HALF_PI); 
    fill('#27ae60'); noStroke(); triangle(0, 0, -5, 10, 5, 10);
    pop();
}

function drawAxial(Rax, xA, xB) {
    let baseline = vigaY + 160; let anchoUtil = width - 2 * margenH;
    let vals = [];
    for (let x = margenH; x <= width - margenH; x += 2) {
        let x_m = pxToM(x);
        let axial = 0; 
        if (x_m > xRelToM(apoyos[0].x_rel)) axial += Rax;
        cargas.forEach(c => { 
            if (x_m > xRelToM(c.x_rel)){
                let fx = c.f * cos(radians(360 - c.ang));
                if (abs(fx) < 0.001) fx = 0;
                axial += fx;
            }
        });
        vals.push(axial);
    }
    dibujarDiagrama(baseline, vals, "Axial (N)", '#2ecc71');
}

function drawCortante(Ray, Rby, xA, xB) {
    let baseline = vigaY + 310; let anchoUtil = width - 2 * margenH;
    let vals = [];
    for (let x = margenH; x <= width - margenH; x += 2) {
        let x_m = pxToM(x);
        let v = 0; 
        if (x_m > xRelToM(apoyos[0].x_rel)) v += Ray; 
        if (x_m > xRelToM(apoyos[1].x_rel)) v += Rby;
        cargas.forEach(c => { 
            if (x_m > xRelToM(c.x_rel)) v -= c.f * sin(radians(360 - c.ang)); 
        });
        distribuidas.forEach(d => {
            let xd1_m = xRelToM(d.x1), xd2_m = xRelToM(d.x2);
            if (x_m > xd1_m) {
                let largo = xd2_m - xd1_m;
                let usado = Math.min(x_m, xd2_m) - xd1_m;
                v -= (d.f * (usado / largo) * d.dir);
            }
        });
        vals.push(v);
    }
    dibujarDiagrama(baseline, vals, "Cortante (V)", '#3498db');
    return vals;
}

function drawMomento(Ray, Rby, xA, xB, vVals) {
    let baselineM = vigaY + 480; let anchoUtil = width - 2 * margenH;
    let vals = [];
    for(let x = margenH; x <= width - margenH; x += 2) {
        let x_m = pxToM(x);
        let xA_m = xRelToM(apoyos[0].x_rel);
        let xB_m = xRelToM(apoyos[1].x_rel);
        let m = 0; 
        if (x_m > xA_m) m += Ray * (x_m - xA_m); 
        if (x_m > xB_m) m += Rby * (x_m - xB_m); 
        cargas.forEach(c => { 
            let cx_m = xRelToM(c.x_rel);
            if (x_m > cx_m) m -= (c.f * sin(radians(360 - c.ang))) * (x_m - cx_m); 
        });
        distribuidas.forEach(d => {
            let xd1_m = xRelToM(d.x1), xd2_m = xRelToM(d.x2);
            if (x_m > xd1_m) {
                let largo = xd2_m - xd1_m;
                let usado = Math.min(x_m, xd2_m) - xd1_m;
                let F_parcial = d.f * (usado / largo) * d.dir;
                let centroide = xd1_m + usado / 2;
                m -= F_parcial * (x_m - centroide);
            }
        });
        vals.push(m);
    }
    
    let extraPoints = [];
    for(let i=1; i < vVals.length; i++) {
        if((vVals[i-1] > 0 && vVals[i] <= 0) || (vVals[i-1] < 0 && vVals[i] >= 0)) {
            extraPoints.push(i * 2 / (width - 2 * margenH));
        }
    }
    dibujarDiagrama(baselineM, vals, "Momento (M)", '#e74c3c', extraPoints);
}

function dibujarDiagrama(yBase, datos, titulo, col, extraX = []) {
    let anchoUtil = width - 2 * margenH;
    let maxAbs = max(datos.map(abs)) || 1;
    let esc = 50 / maxAbs;
    fill(col + '44'); stroke(col); strokeWeight(2);
    beginShape(); vertex(margenH, yBase);
    for(let i=0; i<datos.length; i++) vertex(margenH + i*2, yBase - datos[i] * esc);
    vertex(width - margenH, yBase); endShape(CLOSE);
    stroke(100); line(margenH, yBase, width - margenH, yBase);
    fill(100); noStroke(); textAlign(CENTER); text(titulo, width/2, yBase + 75);

    let pts = [0, 1]; apoyos.forEach(a=>pts.push(a.x_rel)); cargas.forEach(c=>pts.push(c.x_rel));
    distribuidas.forEach(d=>{pts.push(d.x1); pts.push(d.x2);});
    extraX.forEach(ex => pts.push(ex));
    
    pts = [...new Set(pts)].sort((a,b)=>a-b);
    pts.forEach(p => {
        let x = margenH + p * anchoUtil;
        let idx = floor(p * (datos.length-1));
        if (idx >= 0 && idx < datos.length) {
            let val = datos[idx];
            if (abs(val) > 0.01) {
                fill(0); textSize(9);
                text(val.toFixed(1), x, yBase - val * esc + (val > 0 ? -5 : 12));
                stroke(150, 100); line(x, yBase, x, yBase - val * esc);
            }
        }
    });
}

function touchEnded() { dragging = null; }
function doubleClicked() {
    let anchoUtil = width - 2 * margenH;
    apoyos.forEach(ap => { 
	if (dist(mouseX, mouseY, margenH + ap.x_rel * anchoUtil, vigaY) < 50) {
        ap.tipo = ap.tipo === 'fijo' ? 'movil' : 'fijo';
    }
	});
}
// Registro del Service Worker para modo Offline

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker activo', reg))
                .catch(err => console.log('Error al registrar SW', err));
        });
    }
</script>
